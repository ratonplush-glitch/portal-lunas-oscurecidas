<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel de Administración</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0f172a;
color:#fff;
}

header{
background:#1e293b;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

h1{
font-size:28px;
}

.cerrar{
background:#dc2626;
border:none;
color:#fff;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.contenedor{
width:95%;
margin:30px auto;
}

.tarjetas{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:10px;
text-align:center;
font-size:20px;
font-weight:bold;
transition:.2s;
}

.card:hover{
background:#2563eb;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h1>PORTAL DE LUNAS OSCURECIDAS</h1>

<button class="cerrar" onclick="salir()">
Cerrar sesión
</button>

</header>

<div class="contenedor">

<h2>IMPORTAR CERTIFICADO PDF</h2>

<form id="formPDF" enctype="multipart/form-data">

<input
type="file"
id="archivoPDF"
accept=".pdf"
required>

<br><br>

<button type="submit">
IMPORTAR PDF
</button>

</form>

<hr><br>

<div id="resultado"></div>

<div class="tarjetas">

<div class="card">
Usuarios
</div>

<div class="card">
Consultas
</div>

<div class="card">
Vehículos
</div>

<div class="card" onclick="window.location='lunas.html'">
Lunas Oscurecidas
</div>

<div class="card">
Reportes
</div>

<div class="card">
Configuración
</div>

</div>

</div>

<script>

if(sessionStorage.getItem("admin")!=="ok"){
window.location.href="../public/index.html";
}

function salir(){

sessionStorage.removeItem("admin");
window.location.href="../public/index.html";

}

document.getElementById("formPDF").addEventListener("submit",async function(e){

e.preventDefault();

const archivo=document.getElementById("archivoPDF").files[0];

if(!archivo){

alert("Seleccione un archivo PDF");
return;

}

const datos=new FormData();

datos.append("archivo",archivo);

try{

const respuesta=await fetch("/importar/pdf",{

method:"POST",
body:datos

});

const resultado=await respuesta.json();

document.getElementById("resultado").innerHTML=
"<pre>"+JSON.stringify(resultado,null,2)+"</pre>";

}catch(error){

console.error(error);
alert("Error al importar el PDF");

}

});

</script>

</body>
</html>
